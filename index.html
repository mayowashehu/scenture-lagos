<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Scenture Lagos — Premium fragrances, diffusers and home scents. Crafted with passion, designed for distinction." />
    <meta name="theme-color" content="#FAF9F7" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!--
      Fonts — one preconnect pair, one combined Google Fonts request.
      Cormorant Garamond → headings / display  (font-['Cormorant_Garamond'])
      DM Sans            → body / UI text      (font-sans / font-body)
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind compiled output -->
    <link href="/dist/output.css" rel="stylesheet" />

    <title>Scenture Lagos — Perfumes, Diffusers &amp; Home Scents</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
